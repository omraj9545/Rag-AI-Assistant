services:
  # 1. FastAPI Backend API
  - type: web
    name: rag-assistant-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: LLM_PROVIDER
        value: openrouter
      - key: LLM_MODEL
        value: qwen/qwen-2.5-72b-instruct
      - key: OPENROUTER_API_KEY
        sync: false  # You will paste this in the Render UI once during deployment
      - key: GEMINI_API_KEY
        sync: false  # Used for embeddings only

  # 2. Streamlit Web Frontend
  - type: web
    name: rag-assistant-frontend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run streamlit_app.py --server.port $PORT --server.address 0.0.0.0
    envVars:
      - key: API_URL
        fromService:
          type: web
          name: rag-assistant-backend
          property: url
